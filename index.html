<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Café Mix – Linz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:#f8f6f2;
color:#333;
scroll-behavior:smooth;
}

/* HERO */
.hero{
position:relative;
height:85vh;
background:url('hero.jpg') center/cover no-repeat;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:white;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.6);
}

.hero-content{
position:relative;
z-index:1;
animation:fadeUp 1.5s ease;
}

.hero img{
width:120px;
margin-bottom:20px;
}

.hero h1{
font-size:50px;
margin:0;
}

.hero p{
color:#d4af37;
font-size:20px;
}

/* SECTION */
.section{
padding:80px 20px;
max-width:1200px;
margin:auto;
}

h2{
text-align:center;
color:#0f3d2e;
margin-bottom:50px;
}

/* MENU */
.menu-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.menu-item{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
transition:0.3s;
opacity:0;
transform:translateY(40px);
}

.menu-item.show{
opacity:1;
transform:translateY(0);
}

.menu-item:hover{
transform:translateY(-5px);
}

.menu-img{
height:200px;
overflow:hidden;
}

.menu-img img{
width:100%;
height:100%;
object-fit:cover;
}

.menu-content{
padding:20px;
}

.price{
color:#d4af37;
font-weight:600;
margin-top:10px;
}

/* GALLERY */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:300px;
object-fit:cover;
border-radius:12px;
}

/* MAP */
.map iframe{
width:100%;
height:450px;
border:0;
border-radius:12px;
}

/* INSTAGRAM */
.instagram{
text-align:center;
}

.instagram a{
display:inline-block;
padding:14px 30px;
background:#d4af37;
color:#0f3d2e;
text-decoration:none;
border-radius:8px;
font-weight:600;
}

/* FOOTER */
footer{
background:#0f3d2e;
color:white;
text-align:center;
padding:30px;
margin-top:50px;
}

/* ANIMATION */
@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<section class="hero">
<div class="hero-content">
<img src="logo.png">
<h1>Café Mix</h1>
<p>Somalischer Geschmack • Herzlichkeit • Gute Vibes</p>
</div>
</section>

<section class="section">
<h2>Hauptspeisen</h2>
<div class="menu-grid">

<div class="menu-item">
<div class="menu-img"><img src="gericht1.jpg"></div>
<div class="menu-content">
<h3>Reis & Suqaar</h3>
<p>Zarte Lammstücke auf gewürztem Reis.</p>
<p class="price">8 €</p>
</div>
</div>

<div class="menu-item">
<div class="menu-img"><img src="gericht2.jpg"></div>
<div class="menu-content">
<h3>Reis & Fleisch oder Huhn</h3>
<p class="price">10 €</p>
</div>
</div>

</div>
</section>

<section class="section">
<h2>Galerie</h2>
<div class="gallery">
<img src="bild1.jpg">
<img src="bild2.jpg">
<img src="bild3.jpg">
</div>
</section>

<section class="section map">
<h2>Standort</h2>
<iframe src="https://www.google.com/maps?q=Dinghoferstraße+55,+4020+Linz&output=embed"></iframe>
</section>

<section class="section instagram">
<h2>Folge uns auf Instagram</h2>
<a href="https://instagram.com/cafemix2025" target="_blank">
@cafemix2025
</a>
</section>

<footer>
© 2026 Café Mix – Linz
</footer>

<script>
const items = document.querySelectorAll('.menu-item');
const observer = new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
});
items.forEach(item=>{
observer.observe(item);
});
</script>

</body>
</html>
